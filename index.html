<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المؤسس في الرياضيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* الهيدر الكحلي الفاخر مثل السكرين شوت */
        .header-section {
            background: linear-gradient(135deg, #0b132b, #1c2541);
            width: 100%;
            padding: 40px 20px 30px 20px;
            text-align: center;
            position: relative;
            border-bottom: 5px solid #f59e0b; /* الخط الذهبي الفاصل */
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-title {
            color: #ffffff;
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .badge-founder {
            display: inline-block;
            border: 2px solid #f59e0b;
            color: #f59e0b;
            padding: 5px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            background: rgba(245, 158, 11, 0.05);
        }

        /* حاوي المحتوى الرئيسي ليكون متناسق على الموبايل */
        .main-container {
            max-width: 480px;
            width: 92%;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 📲 الزرار البرتقالي في الأول خالص مع تأثير نبض احترافي */
        .btn-install-now {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #ea580c, #f59e0b);
            border: none;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(234, 88, 12, 0.35);
            transition: all 0.3s ease;
            animation: pulseGlow 2s infinite;
        }

        .btn-install-now:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(234, 88, 12, 0.5);
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(234, 88, 12, 0.35); }
            50% { transform: scale(1.02); box-shadow: 0 10px 35px rgba(234, 88, 12, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(234, 88, 12, 0.35); }
        }

        /* كارت الترحيب الأبيض ذو الحواف الذهبية */
        .welcome-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-left: 6px solid #f59e0b;
            border-right: 6px solid #f59e0b;
        }

        .welcome-card h2 {
            font-size: 1.45rem;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .welcome-card p {
            font-size: 1.1rem;
            color: #64748b;
            line-height: 1.7;
            font-weight: 700;
        }

        /* كارت الصورة الدائرية الحرة */
        .image-card {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: #ffffff;
        }

        .image-card img {
            width: 100%;
            display: block;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="header-title">مستر أحمد جابر</h1>
        <div class="badge-founder">المؤسس في الرياضيات</div>
    </div>

    <div class="main-container">
        
        <button id="pwaInstallBtn" class="btn-install-now">
            <span>📲 تثبيت منصة المؤسس كتطبيق على هاتفك الآن</span>
        </button>

        <div class="welcome-card">
            <h2>👋 أهلاً بكم في قلعة "المؤسس" للتميز والإبداع!</h2>
            <p>الرياضيات ليست مجرد أرقام وحسابات، بل هي لغة الأذكياء.. استمتع بالدرس الأول مجاناً في كل مرحلة، وابدأ طريق التفوق! 🚀🏆</p>
        </div>

        <div class="image-card">
            <img src="https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=600&q=80" alt="امتحانات المؤسس">
        </div>

    </div>

    <script>
        // تسجيل السيرفس وركر لتهيئة بيئة الـ PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Active'))
            .catch(err => console.log('Service Worker Error', err));
        }

        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');

        // التقاط رسالة التثبيت الرسمية من المتصفح وحفظها للزرار
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('جاهز للتثبيت الفوري عند ضغط المستر!');
        });

        // تنفيذ عملية التثبيت الفعلية بمجرد ضغط الطالب
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt(); // إظهار نافذة جوجل كروم الرسمية للتثبيت فوراً
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('الطالب قام بتنزيل التطبيق بنجاح!');
                }
                deferredPrompt = null;
            } else {
                // رسالة ذكية تظهر إذا كان التطبيق نازل بالفعل عند الطالب أو المتصفح لا يدعم
                alert('التطبيق جاهز ومثبت بالفعل على شاشة هاتف الرئيسية، أو جهازك يدخلك للمنصة مباشرة! 🚀');
            }
        });
    </script>

</body>
</html>
