<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تثبيت منصة المؤسس في الرياضيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;700;900&display=swap" rel="stylesheet">
    
    <!-- ربط ملف المانيفست الخاص بك لتهيئة التثبيت فوراً -->
    <link rel="manifest" href="manifest.json">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #0b132b, #1c2541);
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: absolute; border-radius: 50%;
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            opacity: 0.08; filter: blur(80px); width: 400px; height: 400px; top: -50px; right: -50px;
        }

        .install-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 28px; padding: 45px 30px; text-align: center;
            max-width: 450px; width: 90%; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .avatar {
            width: 130px; height: 130px; border-radius: 50%;
            border: 4px solid #f59e0b; box-shadow: 0 0 25px rgba(245, 158, 11, 0.4);
            margin-bottom: 20px; object-fit: cover;
        }

        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 5px; }
        .subtitle { font-size: 1.2rem; color: #f59e0b; font-weight: 700; margin-bottom: 15px; }
        .promo-text { font-size: 1rem; color: #94a3b8; margin-bottom: 30px; line-height: 1.6; }

        /* زر التثبيت العملاق */
        .btn-install {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px 20px; font-size: 1.25rem; font-weight: 900;
            color: #ffffff; background: linear-gradient(135deg, #f59e0b, #ea580c);
            border: none; border-radius: 15px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(234, 88, 12, 0.3); transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-install:hover {
            transform: translateY(-3px); box-shadow: 0 15px 25px rgba(234, 88, 12, 0.5);
        }

        /* رابط تخطي التثبيت */
        .btn-skip {
            display: inline-block; margin-top: 20px; font-size: 0.95rem;
            color: #94a3b8; text-decoration: none; transition: color 0.2s;
        }
        .btn-skip:hover { color: #ffffff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="install-card">
        <img class="avatar" src="https://architect1010a-source.github.io/AHMED_SULTAN/logo.jpg" alt="مستر أحمد جابر">
        <h1>منصة المؤسس التعليمية</h1>
        <div class="subtitle">مستر أحمد جابر</div>
        <p class="promo-text">للحصول على أفضل تجربة متابعة سريعة، وتصفح المحاضرات والامتحانات بدون تقطيع، قم بتثبيت التطبيق على جهازك الآن.</p>
        
        <!-- زر التثبيت البرمجي الذكي -->
        <button id="installBtn" class="btn-install">
            <span>📥 تحميل المنصة كتطبيق</span>
        </button>

        <!-- رابط تخطي لمن يفضل المتصفح -->
        <a href="main_platform.html" class="btn-skip">أو الدخول عبر المتصفح مباشرة 🌐</a>
    </div>

    <script>
        // تسجيل السيرفس وركر لضمان تفعيل الـ PWA فوراً
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered[cite: 1]'))
            .catch(err => console.log('Service Worker Failed', err));
        }

        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        // التقاط حدث التثبيت من المتصفح وحفظه
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // منع المتصفح من إظهار شريطه السفلي التلقائي
            deferredPrompt = e; // حفظ الحدث لتشغيله عند ضغط الطالب
            console.log('جاهز للتثبيت الفوري!');
        });

        // تشغيل نافذة التثبيت فور ضغط الطالب على الزرار
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt(); // إظهار نافذة التثبيت الرسمية فوراً
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('الطالب وافق على التثبيت');
                    window.location.href = "main_platform.html"; // توجيهه للمنصة بعد التثبيت
                }
                deferredPrompt = null;
            } else {
                // إذا كان المتصفح لا يدعم أو التطبيق مثبت بالفعل، ينقله للمنصة مباشرة
                window.location.href = "main_platform.html";
            }
        });

        // إذا تم التثبيت بنجاح بالفعل، انقله تلقائياً للمنصة
        window.addEventListener('appinstalled', () => {
            console.log('تم التثبيت بنجاح!');
            window.location.href = "main_platform.html";
        });
    </script>

</body>
</html>
